services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: forks
      POSTGRES_PASSWORD: forkspass
      POSTGRES_DB: forks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forks -d forks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
